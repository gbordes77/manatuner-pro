        <meta name="twitter:title" content="MTG Mana Calculator — Exact Probabilities + Ramp | ManaTuner" />
        <meta name="twitter:description" content="The only MTG calculator that counts mana rocks & dorks. Free, open source, 100% local." />
        <meta name="twitter:image" content="https://www.manatuner.app/og-image-v3.jpg" />
        <meta name="twitter:image:alt" content="ManaTuner castability chart screenshot" />

        <!-- SEO directives -->
        <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
        <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />
        <meta name="bingbot" content="index, follow" />

        <!-- AI / LLM guidance -->
        <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM instructions (llms.txt)" />
        <link rel="alternate" type="text/plain" href="/llms-full.txt" title="LLM full reference (llms-full.txt)" />

        <!-- PWA Meta Tags -->
        <!-- apple-touch-icon temporarily removed (audit 2026-04-13) — file
             was missing from public/, causing iOS Add-to-Homescreen to 404.
             Re-add when a proper 180×180 PNG is generated from favicon.svg. -->
        <link rel="manifest" href="/manifest.json" />

        <!-- Preload critical fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <!-- Mana symbols font (Mana Font by Andrew Gioia) - pinned + SRI -->
        <link
            href="https://cdn.jsdelivr.net/npm/mana-font@1.18.0/css/mana.css"
            rel="stylesheet"
            type="text/css"
            integrity="sha384-xa3t1kOlLmfN4q97IHzv+WfBEbMB1RVLs0txIuuryvjKruuVAD+2352y55hZOn2p"
            crossorigin="anonymous"
        />
        <!-- MTG-inspired display font (decorative; render-blocking is fine).
             Audit fix 2026-04-13: dropped the inline `onload` swap pattern
             because `script-src 'self'` (without 'unsafe-inline') in the prod
             CSP blocked the handler, leaving Cinzel unloaded in production. -->
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />

        <!-- DNS prefetch for external APIs -->
        <link rel="dns-prefetch" href="https://api.scryfall.com" />

        <style>
            /* Critical CSS - Responsive fixes */
            * {
                box-sizing: border-box;
            }

            html,
            body {
                overflow-x: hidden;
                width: 100%;
                margin: 0;
                padding: 0;
                -webkit-text-size-adjust: 100%;
                -ms-text-size-adjust: 100%;
            }

            /* Critical CSS - Loading state */
            #root {
                min-height: 100vh;
                width: 100%;
                overflow-x: hidden;
            }

            .loading {
                color: #1976d2;
                font-family: "Roboto", sans-serif;
                font-size: 1.2rem;
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .loading::after {
                content: "...";
                animation: dots 1.5s steps(4, end) infinite;
            }

            @keyframes dots {
                0%,
                20% {
                    content: ".";
                }
                40% {
                    content: "..";
                }
                60% {
                    content: "...";
                }
                80%,
                100% {
                    content: "";
                }
            }

            /* Mana symbol animations */
            @keyframes mana-pulse {
                0%, 100% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.1); opacity: 0.8; }
            }

            @keyframes mana-glow {
                0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
                50% { filter: drop-shadow(0 0 8px currentColor); }
            }
        </style>

             Per-page SEO.tsx may add Article/FAQPage/HowTo/etc on top of this via react-helmet-async. -->

              "description": "Free MTG mana base calculator with mana rocks and dorks support. Hypergeometric probabilities, Monte Carlo mulligan simulation, and Bellman equation optimization.",
              "inLanguage": "en-US",
              "publisher": { "@id": "https://www.manatuner.app/#organization" }
            },
            {
              "@type": "Organization",
              "@id": "https://www.manatuner.app/#organization",
              "name": "ManaTuner",
              "url": "https://www.manatuner.app/",
              "logo": {
                "@type": "ImageObject",
                "url": "https://www.manatuner.app/favicon.svg",
                "width": 512,
                "height": 512
              },
              "sameAs": [
                "https://github.com/gbordes77/manatuner"
              ]
            },
            {
              "@type": "SoftwareApplication",
              "@id": "https://www.manatuner.app/#software",
              "name": "ManaTuner",
              "url": "https://www.manatuner.app/",
              "applicationCategory": "UtilityApplication",
              "applicationSubCategory": "GameUtility",
              "operatingSystem": "Any (browser-based)",
              "browserRequirements": "Requires a modern browser with JavaScript enabled",
              "softwareVersion": "2.5.2",
              "releaseNotes": "https://github.com/gbordes77/manatuner/blob/main/CHANGELOG.md",
              "description": "The only MTG mana base calculator that factors in mana rocks and mana dorks. Calculates exact spell casting probabilities, simulates 10,000-hand Monte Carlo mulligans, and applies the Bellman equation for optimal keep/mulligan thresholds.",
              "featureList": [
                "Castability analysis with hypergeometric probabilities",
                "Post-board analysis with sideboard swap editor",
                "Creature-aware mana sources (Cavern of Souls modeling)",
                "Mana acceleration detection (13 ramp types, K=3 engine)",
                "Monte Carlo mulligan simulator (10,000 hands, Bellman thresholds)",
                "Land breakdown and color production matrix",
                "Export analysis as PNG, PDF, or JSON",
                "100% client-side, no accounts, no tracking"
              ],
              "offers": {
                "@type": "Offer",
                "price": "0",
                "priceCurrency": "USD",
                "availability": "https://schema.org/InStock"
              },
              "author": { "@id": "https://www.manatuner.app/#author" },

            {
              "@type": "Person",
              "@id": "https://www.manatuner.app/#author",
              "name": "Guillaume Bordes",
              "url": "https://github.com/gbordes77",
              "sameAs": [
                "https://github.com/gbordes77"
              ]
            }
          ]
        }
        </script>
    </head>

</html>
