<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
        />
        <meta name="theme-color" content="#1976d2" />
        <!-- Default title - overridden per-page by react-helmet-async -->
        <title>ManaTuner - Free MTG Mana Base Calculator with Rocks & Dorks</title>
        <meta
            name="description"
            content="The only mana calculator that factors in your mana rocks and dorks — not just lands. Exact probabilities + Monte Carlo mulligan."
        />

        <!-- Default OG tags - overridden per-page by react-helmet-async -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.manatuner.app/" />
        <meta property="og:title" content="ManaTuner - Free MTG Mana Base Calculator with Rocks & Dorks" />
        <meta property="og:description" content="The only mana calculator that factors in your mana rocks and dorks — not just lands. Exact probabilities + Monte Carlo mulligan." />
        <meta property="og:image" content="https://www.manatuner.app/og-image-v2.jpg" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:site_name" content="ManaTuner" />

        <meta name="twitter:card" content="summary_large_image" />

        <!-- SEO -->
        <meta name="robots" content="index, follow" />
        <meta name="author" content="ManaTuner" />

        <!-- AI / LLM guidance -->
        <link rel="alternate" type="text/plain" href="/llms.txt" title="LLM instructions" />

        <!-- PWA Meta Tags -->
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/manifest.json" />

        <!-- Preload critical fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <!-- Mana symbols font (Mana Font by Andrew Gioia) - pinned + SRI -->
        <link
            href="https://cdn.jsdelivr.net/npm/mana-font@1.18.0/css/mana.css"
            rel="stylesheet"
            type="text/css"
            integrity="sha384-xa3t1kOlLmfN4q97IHzv+WfBEbMB1RVLs0txIuuryvjKruuVAD+2352y55hZOn2p"
            crossorigin="anonymous"
        />
        <!-- MTG-inspired display font (non-blocking: decorative, not needed for initial paint) -->
        <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
        <noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" /></noscript>

        <!-- DNS prefetch for external APIs -->
        <link rel="dns-prefetch" href="https://api.scryfall.com" />

        <style>
            /* Critical CSS - Responsive fixes */
            * {
                box-sizing: border-box;
            }

            html,
            body {
                overflow-x: hidden;
                width: 100%;
                margin: 0;
                padding: 0;
                -webkit-text-size-adjust: 100%;
                -ms-text-size-adjust: 100%;
            }

            /* Critical CSS - Loading state */
            #root {
                min-height: 100vh;
                width: 100%;
                overflow-x: hidden;
            }

            .loading {
                color: #1976d2;
                font-family: "Roboto", sans-serif;
                font-size: 1.2rem;
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .loading::after {
                content: "...";
                animation: dots 1.5s steps(4, end) infinite;
            }

            @keyframes dots {
                0%,
                20% {
                    content: ".";
                }
                40% {
                    content: "..";
                }
                60% {
                    content: "...";
                }
                80%,
                100% {
                    content: "";
                }
            }

            /* Mana symbol animations */
            @keyframes mana-pulse {
                0%, 100% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.1); opacity: 0.8; }
            }

            @keyframes mana-glow {
                0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
                50% { filter: drop-shadow(0 0 8px currentColor); }
            }
        </style>
    </head>
    <body>
        <div id="root">
            <div class="loading">Loading ManaTuner</div>
        </div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
