<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0D0F"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- WUBRG 5-color pie -->
    <linearGradient id="wubrg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F6D8"/>
      <stop offset="25%" stop-color="#0E68AB"/>
      <stop offset="50%" stop-color="#9c27b0"/>
      <stop offset="75%" stop-color="#D3202A"/>
      <stop offset="100%" stop-color="#00733E"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 5-color ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#wubrg)" stroke-width="2.5"/>
  <!-- Cinzel-style M -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="15" fill="url(#wubrg)" text-anchor="middle" font-weight="700" letter-spacing="-0.5">M</text>
</svg>
